<!DOCTYPE html>
<html lang="ru" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI-Developer · Методичка преподавателя</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@500;700;800&family=Manrope:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0A0C12; --bg2:#0E1119; --panel:#13161F; --panel2:#171B26;
  --border:#232838; --border2:#2C3346;
  --text:#EAEDF5; --muted:#99A1B5; --muted2:#6C7488;
  --accent:#38D6E6; --cyan:#38D6E6; --violet:#A78BFA; --emerald:#34D399; --amber:#F5A623;
  --wall:#F5A623; --ok:#34D399;
  --easy:#34D399; --med:#F5C451; --hard:#F1736A;
  --shadow:0 10px 30px rgba(0,0,0,.45);
  --radius:14px;
}
html[data-theme="light"]{
  --bg:#EEF1F7; --bg2:#E7EBF3; --panel:#FFFFFF; --panel2:#F6F8FC;
  --border:#DDE3EE; --border2:#CCD4E3;
  --text:#171A22; --muted:#5C6478; --muted2:#8A93A6;
  --shadow:0 10px 28px rgba(20,30,60,.10);
}
html[data-theme="light"] .glow{opacity:.10!important}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{
  font-family:'Manrope',system-ui,sans-serif;
  background:var(--bg); color:var(--text);
  -webkit-font-smoothing:antialiased; line-height:1.55;
  overflow:hidden;
}
.m1{--accent:var(--cyan)} .m2{--accent:var(--violet)} .m3{--accent:var(--emerald)} .m4{--accent:var(--amber)}

/* glows */
.glow{position:fixed;border-radius:50%;filter:blur(120px);pointer-events:none;z-index:0}
.glow.g1{top:-220px;right:-160px;width:520px;height:520px;background:#7C5CFC;opacity:.18}
.glow.g2{bottom:-260px;left:-180px;width:520px;height:520px;background:#1E9CD7;opacity:.14}

/* header */
header{
  position:fixed;top:0;left:0;right:0;height:70px;z-index:30;
  display:flex;align-items:center;gap:18px;padding:0 22px;
  background:rgba(10,12,18,.78);backdrop-filter:blur(14px);
  border-bottom:1px solid var(--border);
}
html[data-theme="light"] header{background:rgba(255,255,255,.82)}
.brand{display:flex;align-items:center;gap:13px;min-width:0}
.logo{
  width:40px;height:40px;border-radius:11px;flex:none;
  background:linear-gradient(135deg,#A78BFA,#38D6E6);
  display:grid;place-items:center;font-family:'Unbounded';font-weight:800;color:#0A0C12;font-size:18px;
  box-shadow:0 6px 18px rgba(124,92,252,.4);
}
.brand h1{font-family:'Unbounded';font-weight:700;font-size:17px;letter-spacing:.2px;white-space:nowrap}
.brand p{font-size:11.5px;color:var(--muted);font-weight:600;letter-spacing:.3px;text-transform:uppercase;margin-top:1px}
.htools{margin-left:auto;display:flex;align-items:center;gap:11px}
.search{position:relative}
.search input{
  width:300px;max-width:42vw;height:42px;border-radius:11px;border:1px solid var(--border2);
  background:var(--panel);color:var(--text);padding:0 14px 0 40px;font-family:'Manrope';font-size:14px;outline:none;transition:.18s;
}
.search input:focus{border-color:var(--accent);box-shadow:0 0 0 3px color-mix(in srgb,var(--accent) 22%,transparent)}
.search svg{position:absolute;left:13px;top:50%;transform:translateY(-50%);color:var(--muted2)}
.iconbtn{
  width:42px;height:42px;border-radius:11px;border:1px solid var(--border2);background:var(--panel);
  color:var(--muted);cursor:pointer;display:grid;place-items:center;transition:.18s;flex:none;
}
.iconbtn:hover{color:var(--text);border-color:var(--accent)}
/* password gate / lock setup */
.gate{position:fixed;inset:0;z-index:9999;background:var(--bg);display:grid;place-items:center;padding:24px}
.gate-box{width:100%;max-width:380px;border:1px solid var(--border2);background:var(--panel);border-radius:18px;padding:32px 28px;text-align:center;box-shadow:var(--shadow)}
.gate-logo{width:54px;height:54px;border-radius:14px;background:linear-gradient(135deg,var(--cyan),var(--violet));display:grid;place-items:center;font-family:'Unbounded';font-weight:800;color:#0A0C12;font-size:22px;margin:0 auto 18px}
.gate-box h1{font-family:'Unbounded';font-weight:700;font-size:21px;margin-bottom:9px}
.gate-box p{font-size:14px;color:var(--muted);line-height:1.55;margin-bottom:20px}
.gate-box input{width:100%;height:46px;border:1px solid var(--border2);border-radius:11px;background:var(--bg);color:var(--text);font-family:'Manrope';font-size:15px;padding:0 14px;margin-bottom:11px;outline:none;transition:.18s}
.gate-box input:focus{border-color:var(--accent);box-shadow:0 0 0 3px color-mix(in srgb,var(--accent) 20%,transparent)}
.gate-box button{width:100%;height:46px;border:none;border-radius:11px;background:var(--accent);color:#0A0C12;font-family:'Manrope';font-weight:800;font-size:15px;cursor:pointer;transition:.18s}
.gate-box button:hover{filter:brightness(1.06)}
.gate-box button:disabled{opacity:.6;cursor:default}
.gate-box button.gate-ghost{background:transparent;color:var(--muted);border:1px solid var(--border2);margin-top:9px}
.gate-err{font-size:13.5px;color:#F1736A;font-weight:600;margin-top:13px;min-height:18px;line-height:1.4}
.menubtn{display:none}

/* layout */
.layout{position:absolute;top:70px;left:0;right:0;bottom:0;display:flex;z-index:1}
aside{
  width:330px;flex:none;height:100%;overflow-y:auto;border-right:1px solid var(--border);
  padding:18px 14px 60px;background:var(--bg2);
}
aside::-webkit-scrollbar,main::-webkit-scrollbar{width:9px}
aside::-webkit-scrollbar-thumb,main::-webkit-scrollbar-thumb{background:var(--border2);border-radius:8px}
.navtop{margin-bottom:8px}
.navtop button{
  width:100%;text-align:left;border:1px solid var(--border);background:var(--panel);color:var(--text);
  padding:12px 14px;border-radius:11px;cursor:pointer;font-family:'Manrope';font-weight:700;font-size:13.5px;
  display:flex;align-items:center;gap:10px;transition:.15s;
}
.navtop button:hover{border-color:var(--violet)}
.navtop button.active{border-color:var(--violet);background:color-mix(in srgb,var(--violet) 14%,var(--panel))}
.navtop button svg{color:var(--violet)}

.modgroup{margin-top:18px}
.modhead{display:flex;align-items:center;gap:9px;padding:4px 8px 9px}
.moddot{width:9px;height:9px;border-radius:50%;background:var(--accent);box-shadow:0 0 10px var(--accent)}
.modhead .mt{font-family:'Unbounded';font-weight:600;font-size:11px;letter-spacing:.4px;color:var(--accent);text-transform:uppercase}
.modhead .mm{font-size:10.5px;color:var(--muted2);font-weight:600;margin-left:auto}
.lessrow{
  width:100%;text-align:left;border:1px solid transparent;background:transparent;color:var(--text);
  padding:9px 10px;border-radius:10px;cursor:pointer;display:flex;gap:11px;align-items:flex-start;transition:.14s;font-family:'Manrope';
}
.lessrow:hover{background:var(--panel)}
.lessrow.active{background:color-mix(in srgb,var(--accent) 13%,var(--panel));border-color:color-mix(in srgb,var(--accent) 45%,transparent)}
.lnum{
  font-family:'JetBrains Mono';font-size:11px;font-weight:600;color:var(--accent);
  background:color-mix(in srgb,var(--accent) 14%,transparent);border:1px solid color-mix(in srgb,var(--accent) 34%,transparent);
  border-radius:7px;padding:3px 6px;flex:none;line-height:1;margin-top:1px;
}
.lessrow .lt{font-size:13px;font-weight:600;line-height:1.35}
.lessrow .lt small{display:block;color:var(--muted2);font-weight:500;font-size:11px;margin-top:2px}

/* main */
main{flex:1;height:100%;overflow-y:auto;padding:34px 40px 90px;position:relative}
.wrap{max-width:920px;margin:0 auto;animation:fade .4s ease}
@keyframes fade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}

.crumb{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--muted2);font-weight:600;margin-bottom:14px;text-transform:uppercase;letter-spacing:.4px}
.crumb .moddot{width:8px;height:8px}
h2.ltitle{font-family:'Unbounded';font-weight:700;font-size:30px;line-height:1.12;letter-spacing:-.3px}
.meta{display:flex;flex-wrap:wrap;gap:9px;margin:16px 0 8px}
.chip{font-size:12px;font-weight:600;padding:6px 11px;border-radius:8px;border:1px solid var(--border2);color:var(--muted);background:var(--panel)}
.chip.type{color:var(--accent);border-color:color-mix(in srgb,var(--accent) 40%,transparent);background:color-mix(in srgb,var(--accent) 12%,transparent)}
.chip.flag{color:#0A0C12;background:var(--wall);border-color:var(--wall);font-weight:800}

.sect{margin-top:28px}
.sect h3{
  font-family:'Manrope';font-weight:800;font-size:12px;letter-spacing:1.2px;text-transform:uppercase;
  color:var(--muted2);margin-bottom:13px;display:flex;align-items:center;gap:9px;
}
.sect h3 .bar{width:18px;height:2px;background:var(--accent);border-radius:2px}
.lead{font-size:16.5px;color:var(--text);line-height:1.6}
.lead.muted{color:var(--muted)}

.callout{
  border:1px solid color-mix(in srgb,var(--accent) 40%,transparent);
  background:color-mix(in srgb,var(--accent) 9%,var(--panel));
  border-radius:var(--radius);padding:18px 20px;position:relative;overflow:hidden;
}
.callout:before{content:"";position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--accent)}
.callout .cl{display:flex;align-items:center;gap:9px;font-size:12px;font-weight:800;letter-spacing:.6px;text-transform:uppercase;color:var(--accent);margin-bottom:7px}
.callout p{font-size:15.5px;line-height:1.55}

.hook{
  border:1px solid color-mix(in srgb,var(--accent) 45%,transparent);
  background:linear-gradient(135deg,color-mix(in srgb,var(--accent) 14%,var(--panel)),var(--panel));
  border-radius:var(--radius);padding:20px 22px;display:flex;gap:16px;align-items:flex-start;
}
.hook .hi{
  width:42px;height:42px;border-radius:11px;flex:none;display:grid;place-items:center;
  background:color-mix(in srgb,var(--accent) 22%,transparent);color:var(--accent);
}
.hook .hl{font-size:11.5px;font-weight:800;letter-spacing:.6px;text-transform:uppercase;color:var(--accent);margin-bottom:5px}
.hook p{font-size:15px;line-height:1.55}

.tools{display:flex;flex-wrap:wrap;gap:9px}
.tool{
  font-family:'JetBrains Mono';font-size:12.5px;font-weight:500;padding:7px 12px;border-radius:9px;
  border:1px solid var(--border2);background:var(--panel);color:var(--text);
  display:flex;align-items:center;gap:8px;
}
.tool:before{content:"";width:7px;height:7px;border-radius:2px;background:var(--accent)}

/* stages timeline */
.stage{display:flex;gap:16px;padding:0 0 4px}
.stage:not(:last-child) .stime:after{content:"";position:absolute;left:50%;top:34px;bottom:-14px;width:2px;transform:translateX(-50%);background:var(--border2)}
.stime{position:relative;flex:none;width:78px}
.stime span{
  font-family:'JetBrains Mono';font-size:11px;font-weight:600;color:var(--accent);
  border:1px solid color-mix(in srgb,var(--accent) 34%,transparent);background:color-mix(in srgb,var(--accent) 10%,transparent);
  border-radius:8px;padding:6px 4px;display:block;text-align:center;line-height:1.2;
}
.sbody{padding-bottom:20px;border-bottom:1px dashed transparent}
.sbody h4{font-size:15px;font-weight:700;margin-bottom:3px}
.sbody p{font-size:14px;color:var(--muted);line-height:1.5}

/* prompts */
.prompt{border:1px solid var(--border2);background:var(--panel);border-radius:var(--radius);overflow:hidden;margin-bottom:14px}
.prompt-head{display:flex;align-items:center;gap:10px;padding:13px 16px;border-bottom:1px solid var(--border);flex-wrap:wrap}
.who{font-size:11px;font-weight:800;letter-spacing:.5px;text-transform:uppercase;padding:4px 9px;border-radius:7px}
.who.student{color:var(--cyan);background:color-mix(in srgb,var(--cyan) 14%,transparent);border:1px solid color-mix(in srgb,var(--cyan) 34%,transparent)}
.who.teacher{color:var(--violet);background:color-mix(in srgb,var(--violet) 14%,transparent);border:1px solid color-mix(in srgb,var(--violet) 34%,transparent)}
.pctx{font-family:'JetBrains Mono';font-size:11.5px;color:var(--muted2)}
.plabel{font-size:13px;color:var(--muted);font-weight:600}
.copy{
  margin-left:auto;border:1px solid var(--border2);background:var(--panel2);color:var(--muted);cursor:pointer;
  font-family:'Manrope';font-weight:700;font-size:11.5px;padding:6px 11px;border-radius:8px;display:flex;align-items:center;gap:6px;transition:.15s;
}
.copy:hover{color:var(--text);border-color:var(--accent)}
.copy.done{color:var(--ok);border-color:var(--ok)}
.prompt pre{
  font-family:'JetBrains Mono';font-size:13px;line-height:1.6;color:var(--text);
  padding:16px;white-space:pre-wrap;word-break:break-word;background:var(--bg2);
}

.portfolio{display:inline-flex;align-items:center;gap:10px;border:1px solid color-mix(in srgb,var(--ok) 40%,transparent);background:color-mix(in srgb,var(--ok) 10%,var(--panel));color:var(--ok);font-weight:700;font-size:14px;padding:11px 16px;border-radius:11px}

.wallbanner{
  border:1px solid var(--wall);background:color-mix(in srgb,var(--wall) 12%,var(--panel));
  border-radius:var(--radius);padding:16px 20px;display:flex;gap:14px;align-items:flex-start;margin-bottom:6px;
}
.wallbanner .wi{color:var(--wall);flex:none}
.wallbanner b{color:var(--wall)}
.wallbanner p{font-size:14.5px;line-height:1.5}

/* intro/methodology */
.introhero h2{font-family:'Unbounded';font-weight:800;font-size:32px;line-height:1.1;letter-spacing:-.4px}
.introhero p.sub{font-size:16px;color:var(--muted);margin-top:12px;max-width:680px}
.cards{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:18px}
.card{border:1px solid var(--border2);background:var(--panel);border-radius:var(--radius);padding:18px}
.card .ct{font-family:'Unbounded';font-weight:600;font-size:13px;letter-spacing:.3px;display:flex;align-items:center;gap:9px}
.card p{font-size:13.5px;color:var(--muted);margin-top:9px;line-height:1.5}
.card .ident{font-size:13px;font-weight:700;margin-top:11px;padding-top:11px;border-top:1px solid var(--border)}
/* homework */
.lessrow.hwrow .lnum.hwn{display:grid;place-items:center}
.hw-list{display:flex;flex-direction:column;gap:14px;margin-top:6px}
.hw{position:relative;border:1px solid var(--border2);background:var(--panel);border-radius:var(--radius);padding:17px 18px 17px 21px;overflow:hidden}
.hw:before{content:"";position:absolute;left:0;top:0;bottom:0;width:5px}
.hw.easy:before{background:var(--easy)} .hw.med:before{background:var(--med)} .hw.hard:before{background:var(--hard)}
.hw-top{display:flex;align-items:center;gap:11px;flex-wrap:wrap;margin-bottom:9px}
.hw-badge{font-size:11.5px;font-weight:800;letter-spacing:.5px;text-transform:uppercase;padding:4px 10px;border-radius:7px;color:#0A0C12}
.hw.easy .hw-badge{background:var(--easy)} .hw.med .hw-badge{background:var(--med)} .hw.hard .hw-badge{background:var(--hard)}
.hw-basis{font-size:12px;font-weight:600;color:var(--muted2)}
.hw-title{font-size:16px;font-weight:700;color:var(--text);margin-bottom:6px}
.hw-desc{font-size:14.5px;color:var(--muted);line-height:1.55}
.hw-deliver{margin-top:11px;font-size:13.5px;color:var(--text);background:var(--bg);border:1px solid var(--border);border-radius:9px;padding:9px 12px;line-height:1.5}
.hw-deliver span{font-weight:800;color:var(--accent)}
.mtpl{counter-reset:step;display:flex;flex-direction:column;gap:11px}
.mtpl .row{display:flex;gap:14px;align-items:flex-start;border:1px solid var(--border2);background:var(--panel);border-radius:12px;padding:13px 16px}
.mtpl .rt{font-family:'JetBrains Mono';font-size:11.5px;font-weight:600;color:var(--cyan);flex:none;width:84px;border:1px solid color-mix(in srgb,var(--cyan) 30%,transparent);background:color-mix(in srgb,var(--cyan) 10%,transparent);border-radius:8px;padding:6px 4px;text-align:center}
.mtpl h4{font-size:14.5px;font-weight:700}
.mtpl p{font-size:13.5px;color:var(--muted);margin-top:2px}
.legend{display:flex;flex-direction:column;gap:10px}
.legend .li{display:flex;gap:12px;align-items:flex-start;font-size:14px;color:var(--muted)}
.legend .li b{color:var(--text)}
.philo{border:1px solid color-mix(in srgb,var(--violet) 35%,transparent);background:color-mix(in srgb,var(--violet) 8%,var(--panel));border-radius:var(--radius);padding:20px 22px}
.philo p{font-size:15px;line-height:1.6;margin-bottom:10px}
.philo p:last-child{margin-bottom:0}
.philo .acc{color:var(--violet);font-weight:700}

.hidden{display:none!important}
.empty{color:var(--muted2);font-size:13px;text-align:center;padding:30px}

@media(max-width:900px){
  .menubtn{display:grid}
  aside{position:fixed;left:0;top:70px;bottom:0;z-index:25;transform:translateX(-100%);transition:.25s;box-shadow:var(--shadow)}
  aside.open{transform:none}
  main{padding:24px 18px 80px}
  .search input{width:160px}
  .cards{grid-template-columns:1fr}
  h2.ltitle{font-size:24px}
}
@media(max-width:600px){
  header{gap:10px;padding:0 12px}
  .brand{gap:9px;flex:none;margin-right:2px}
  .brand .txt{display:none}
  .htools{gap:8px;flex:1;min-width:0}
  .search{flex:1;min-width:0}
  .search input{width:100%;max-width:none}
  h2.ltitle{font-size:21px;line-height:1.18}
}
</style>
</head>
<body>
<div class="glow g1"></div><div class="glow g2"></div>

<header>
  <button class="iconbtn menubtn" id="menuBtn" aria-label="Меню">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
  </button>
  <div class="brand">
    <div class="logo">AI</div>
    <div class="txt">
      <h1>AI-Developer</h1>
      <p>Методичка преподавателя</p>
    </div>
  </div>
  <div class="htools">
    <div class="search">
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input id="search" type="text" placeholder="Поиск урока или инструмента…">
    </div>
    <button class="iconbtn" id="themeBtn" aria-label="Тема">
      <svg id="themeIcon" width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.8A9 9 0 1 1 11.2 3 7 7 0 0 0 21 12.8z"/></svg>
    </button>
    <!-- <button class="iconbtn" id="lockBtn" aria-label="Защитить паролем" title="Защитить паролем и скачать" style="display:none">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
    </button> -->
  </div>
</header>

<div class="layout">
  <aside id="aside">
    <div class="navtop">
      <button id="introBtn" class="active" onclick="showIntro()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><line x1="12" y1="8" x2="12" y2="8"/><line x1="12" y1="11" x2="12" y2="16"/></svg>
        Как пользоваться · методология
      </button>
    </div>
    <div id="nav"></div>
  </aside>
  <main id="main"></main>
</div>

<script>
/* ====================== ЗАЩИТА ПАРОЛЕМ (ШИФРОВАНИЕ) ====================== */
/* Контент шифруется паролем (AES-256-GCM). В защищённом файле этого массива
   физически нет — только зашифрованный VAULT. Пароль нигде не хранится. */
const ORIGINAL_HTML = '<!DOCTYPE html>\n' + document.documentElement.outerHTML;
const LOCKED = false;   /* в защищённой версии замок ставит true */
const VAULT  = "";      /* сюда замок кладёт зашифрованный контент */
let MODULES = null;

/* ====================== ДАННЫЕ КУРСА ====================== */
/*CONTENT_START*/
const MODULES_SRC = [
{
  id:1, cls:'m1', month:'Месяц 1',
  title:'Знакомство с ИИ-инструментами и первые приложения',

const main=document.getElementById('main');
const nav=document.getElementById('nav');

function esc(s){return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}

/* sidebar */
function buildNav(){
  let h='';
  MODULES.forEach(m=>{
    h+=`<div class="modgroup ${m.cls}">
      <div class="modhead"><span class="moddot"></span><span class="mt">Модуль ${m.id}</span><span class="mm">${m.month}</span></div>`;
    m.lessons.forEach(l=>{
      const dataStr=(l.n+' '+l.title+' '+l.tools.join(' ')+' '+l.short).toLowerCase();
      h+=`<button class="lessrow" data-id="${l.n}" data-search="${esc(dataStr)}" onclick="showLesson('${l.n}')">
        <span class="lnum">${l.n}</span>
        <span class="lt">${esc(l.title)}<small>${esc(l.type)}</small></span>
      </button>`;
    });
    if(m.homework && m.homework.length){
      const hwSearch=('домашка домашнее задание дз homework блок '+m.id+' '+m.homework.map(t=>t.title).join(' ')).toLowerCase();
      h+=`<button class="lessrow hwrow" data-id="hw${m.id}" data-search="${esc(hwSearch)}" onclick="showHomework(${m.id})">
        <span class="lnum hwn"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 20h9"/><path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4Z"/></svg></span>
        <span class="lt">Домашка блока ${m.id}<small>${m.homework.length} задания</small></span>
      </button>`;
    }
    h+=`</div>`;
  });
  nav.innerHTML=h;
}

function findLesson(id){
  for(const m of MODULES){const l=m.lessons.find(x=>x.n===id); if(l) return {m,l};}
  return null;
}

function setActive(id){
  document.querySelectorAll('.lessrow').forEach(b=>b.classList.toggle('active',b.dataset.id===id));
  document.getElementById('introBtn').classList.toggle('active',id==='intro');
}

function showLesson(id){
  const f=findLesson(id); if(!f) return;
  const {m,l}=f;
  setActive(id);
  let h=`<div class="wrap ${m.cls}">
    <div class="crumb"><span class="moddot"></span>Модуль ${m.id} · ${esc(m.month)} · Урок ${l.n}</div>
    <h2 class="ltitle">${esc(l.title)}</h2>
    <div class="meta">
      <span class="chip type">${esc(l.type)}</span>
      ${l.flag?`<span class="chip flag">⚑ ${esc(l.flag)}</span>`:''}
      ${l.portfolio?`<span class="chip">＋ В портфолио</span>`:''}
    </div>`;

  if(l.wall){
    h+=`<div class="wallbanner" style="margin-top:18px">
      <svg class="wi" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 9v4"/><path d="M12 17h.01"/><path d="M10.3 3.9 1.8 18a2 2 0 0 0 1.7 3h17a2 2 0 0 0 1.7-3L13.7 3.9a2 2 0 0 0-3.4 0z"/></svg>
      <p><b>Заметка преподавателю.</b> ${esc(l.wall)}</p></div>`;
  }
  if(l.note){
    h+=`<div class="wallbanner" style="margin-top:18px">
      <svg class="wi" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><path d="M12 8h.01"/><path d="M11 12h1v4h1"/></svg>
      <p><b>Заметка преподавателю.</b> ${esc(l.note)}</p></div>`;
  }

  h+=`<div class="sect"><h3><span class="bar"></span>Краткое описание</h3>
    <p class="lead muted">${esc(l.short)}</p></div>`;

  h+=`<div class="sect"><div class="callout"><div class="cl">
    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><polygon points="12 2 15 9 22 9 16 14 18 22 12 17 6 22 8 14 2 9 9 9 12 2"/></svg>
    Что нового на этом уроке</div><p>${esc(l.isNew)}</p></div></div>`;

  h+=`<div class="sect"><h3><span class="bar"></span>Инструменты урока</h3>
    <div class="tools">${l.tools.map(t=>`<span class="tool">${esc(t)}</span>`).join('')}</div></div>`;

  h+=`<div class="sect"><h3><span class="bar"></span>Этапы урока · 90 минут</h3><div class="stages">`;
  l.stages.forEach(s=>{
    h+=`<div class="stage"><div class="stime"><span>${esc(s.t)}</span></div>
      <div class="sbody"><h4>${esc(s.h)}</h4><p>${esc(s.d)}</p></div></div>`;
  });
  h+=`</div></div>`;

  if(l.prompts && l.prompts.length){
    h+=`<div class="sect"><h3><span class="bar"></span>Промпты урока</h3>`;
    l.prompts.forEach(p=>{
      const cls=p.who==='teacher'?'teacher':'student';
      const who=p.who==='teacher'?'Преподаватель':'Студент';
      h+=`<div class="prompt"><div class="prompt-head">
        <span class="who ${cls}">${who}</span>
        ${p.ctx?`<span class="pctx">${esc(p.ctx)}</span>`:''}
        ${p.label?`<span class="plabel">— ${esc(p.label)}</span>`:''}
        <button class="copy" type="button"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>Копировать</button>
      </div><pre>${esc(p.text)}</pre></div>`;
    });
    h+=`</div>`;
  }

  h+=`<div class="sect"><div class="hook">
    <div class="hi"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg></div>
    <div><div class="hl">Крючок на следующий урок</div><p>${esc(l.hook)}</p></div></div></div>`;

  if(l.portfolio){
    h+=`<div class="sect"><span class="portfolio">
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 6 9 17l-5-5"/></svg>
      В портфолио: ${esc(l.portfolio)}</span></div>`;
  }

  h+=`</div>`;
  main.innerHTML=h;
  main.scrollTop=0;
  closeMobileNav();
}

function showHomework(mid){
  const m=MODULES.find(x=>x.id===mid); if(!m||!m.homework) return;
  document.querySelectorAll('.lessrow').forEach(b=>b.classList.toggle('active',b.dataset.id==='hw'+mid));
  document.getElementById('introBtn').classList.remove('active');
  const lvl={'лёгкое':'easy','среднее':'med','сложное':'hard'};

/* copy */
document.addEventListener('click',e=>{
  const btn=e.target.closest('.copy');
  if(!btn) return;
  const pre=btn.closest('.prompt').querySelector('pre');
  const txt=pre.innerText;
  const done=()=>{const o=btn.innerHTML;btn.classList.add('done');btn.innerHTML='✓ Скопировано';setTimeout(()=>{btn.classList.remove('done');btn.innerHTML=o;},1500);};
  if(navigator.clipboard&&navigator.clipboard.writeText){navigator.clipboard.writeText(txt).then(done).catch(()=>fallback(txt,done));}
  else fallback(txt,done);
});
function fallback(txt,cb){const ta=document.createElement('textarea');ta.value=txt;ta.style.position='fixed';ta.style.opacity='0';document.body.appendChild(ta);ta.select();try{document.execCommand('copy');cb();}catch(e){}document.body.removeChild(ta);}

/* search */
document.getElementById('search').addEventListener('input',e=>{
  const q=e.target.value.trim().toLowerCase();
  document.querySelectorAll('.lessrow').forEach(b=>{
    b.classList.toggle('hidden', q && !b.dataset.search.includes(q));
  });
  document.querySelectorAll('.modgroup').forEach(g=>{
    const any=[...g.querySelectorAll('.lessrow')].some(b=>!b.classList.contains('hidden'));
    g.classList.toggle('hidden', q && !any);
  });
});

/* ====================== ЗАЩИТА: КРИПТО + ЭКРАНЫ ====================== */
const td=new TextDecoder(), te=new TextEncoder();
function b64e(buf){let s='';const b=new Uint8Array(buf);for(let i=0;i<b.length;i++)s+=String.fromCharCode(b[i]);return btoa(s);}
function b64d(str){const s=atob(str),b=new Uint8Array(s.length);for(let i=0;i<s.length;i++)b[i]=s.charCodeAt(i);return b;}
async function deriveKey(pass,salt){
  const base=await crypto.subtle.importKey('raw',te.encode(pass),'PBKDF2',false,['deriveKey']);
  return crypto.subtle.deriveKey({name:'PBKDF2',salt,iterations:250000,hash:'SHA-256'},base,{name:'AES-GCM',length:256},false,['encrypt','decrypt']);
}
function cryptoReady(){return window.crypto&&crypto.subtle;}

/* ----- ЭКРАН ВВОДА ПАРОЛЯ (в защищённом файле) ----- */
function showGate(){
  const ov=document.createElement('div');ov.className='gate';
  ov.innerHTML=`<div class="gate-box">
    <div class="gate-logo">AI</div>
    <h1>Доступ к методичке</h1>
    <p>Материалы зашифрованы. Введите пароль, выданный старшим преподавателем.</p>
    <input id="gpass" type="password" placeholder="Пароль" autocomplete="off" autofocus>
    <button id="gbtn">Войти</button>
    <div id="gerr" class="gate-err"></div>
  </div>`;
  document.body.appendChild(ov);
  const inp=ov.querySelector('#gpass'),btn=ov.querySelector('#gbtn'),err=ov.querySelector('#gerr');
  if(!cryptoReady()){err.textContent='Браузер не поддерживает расшифровку. Откройте файл в современном браузере (Chrome, Edge, Firefox, Safari) или по https.';}
  const tryUnlock=async()=>{
    const pass=inp.value;if(!pass)return;
    btn.disabled=true;btn.textContent='Проверка…';err.textContent='';
    try{
      const [s,i,c]=VAULT.split('.');
      const key=await deriveKey(pass,b64d(s));
      const pt=await crypto.subtle.decrypt({name:'AES-GCM',iv:b64d(i)},key,b64d(c));
      MODULES=JSON.parse(td.decode(pt));
      ov.remove();boot();
    }catch(e){
      err.textContent='Неверный пароль';btn.disabled=false;btn.textContent='Войти';
      inp.value='';inp.focus();
    }
  };
  btn.addEventListener('click',tryUnlock);
  inp.addEventListener('keydown',e=>{if(e.key==='Enter')tryUnlock();});
}

/* ----- ОКНО «ЗАЩИТИТЬ» (только в мастер-файле) ----- */
function showLockSetup(){
  const ov=document.createElement('div');ov.className='gate';
  ov.innerHTML=`<div class="gate-box">
    <div class="gate-logo">🔒</div>
    <h1>Защитить паролем</h1>
    <p>Придумайте пароль. Мы зашифруем им все материалы и скачаем защищённый файл — раздавайте преподавателям именно его. Пароль нигде не сохраняется, поэтому запишите его: восстановить нельзя.</p>
    <input id="p1" type="password" placeholder="Пароль (минимум 8 символов)" autocomplete="off" autofocus>
    <input id="p2" type="password" placeholder="Повторите пароль" autocomplete="off">
    <button id="lbtn">Зашифровать и скачать</button>
    <button id="lcancel" class="gate-ghost">Отмена</button>
    <div id="lerr" class="gate-err"></div>
  </div>`;
  document.body.appendChild(ov);
  const p1=ov.querySelector('#p1'),p2=ov.querySelector('#p2'),btn=ov.querySelector('#lbtn'),err=ov.querySelector('#lerr');
  ov.querySelector('#lcancel').addEventListener('click',()=>ov.remove());
  if(!cryptoReady()){err.textContent='Шифрование недоступно в этом окружении. Откройте файл по https или localhost.';btn.disabled=true;}
  btn.addEventListener('click',async()=>{
    err.textContent='';
    if(p1.value.length<8){err.textContent='Пароль слишком короткий (минимум 8 символов).';return;}
    if(p1.value!==p2.value){err.textContent='Пароли не совпадают.';return;}
    btn.disabled=true;btn.textContent='Шифрование…';
    try{
      const salt=crypto.getRandomValues(new Uint8Array(16));
      const iv=crypto.getRandomValues(new Uint8Array(12));
      const key=await deriveKey(p1.value,salt);
      const ct=await crypto.subtle.encrypt({name:'AES-GCM',iv},key,te.encode(JSON.stringify(MODULES_SRC)));
      const vault=b64e(salt)+'.'+b64e(iv)+'.'+b64e(ct);
      let html=ORIGINAL_HTML;
      html=html.replace('const LOCKED = false;','const LOCKED = true;');
      html=html.replace('const VAULT  = "";','const VAULT  = "'+vault+'";');
      const a=html.indexOf('/*CONTENT_START*/'),b=html.indexOf('/*CONTENT_END*/');
      html=html.slice(0,a)+'/*CONTENT_START*/\nconst MODULES_SRC = null;\n'+html.slice(b);
      const blob=new Blob([html],{type:'text/html;charset=utf-8'});
      const url=URL.createObjectURL(blob);
      const a2=document.createElement('a');a2.href=url;a2.download='ai-developer-guide-locked.html';a2.click();
      URL.revokeObjectURL(url);
      btn.textContent='Готово — файл скачан';
      err.style.color='var(--ok)';err.textContent='Защищённый файл скачан. Раздавайте ai-developer-guide-locked.html';
    }catch(e){btn.disabled=false;btn.textContent='Зашифровать и скачать';err.textContent='Ошибка шифрования: '+e.message;}
  });
}

/* ====================== ЗАПУСК ====================== */
function boot(){buildNav();showIntro();}

if(LOCKED){
  showGate();
}else{
  MODULES=MODULES_SRC;
  boot();
  /* кнопка «Защитить» — только в незашифрованном мастер-файле */
  const lb=document.getElementById('lockBtn');
  if(lb){lb.style.display='grid';lb.addEventListener('click',showLockSetup);}
}
